<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Markt ToDo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f4f4f4; }
    h1 { margin-bottom: 10px; }
    .box { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
    .task { padding:10px; border-bottom:1px solid #ddd; border-radius:6px; margin-bottom:6px; }
    .high { background:#ffe5e5; }
    .medium { background:#fff5cc; }
    .low { background:#e8f5e9; }
    .done { text-decoration: line-through; color: gray; }
    select, input, button { padding:8px; margin:4px; }
  </style>
</head>
<body>

<h1>Markt ToDo</h1>

<div class="box">
  <input id="name" placeholder="Dein Name" />

  <select id="areaFilter" onchange="loadTasks()">
    <option value="">Alle Bereiche</option>
    <option>O&G</option>
    <option>MoPro</option>
    <option>Markt</option>
  </select>

  <select id="day" onchange="loadTasks()">
    <option>Montag</option>
    <option>Dienstag</option>
    <option>Mittwoch</option>
    <option>Donnerstag</option>
    <option>Freitag</option>
    <option>Samstag</option>
  </select>

  <button onclick="loadTasks()">Aktualisieren</button>
</div>

<div id="tasks" class="box"></div>

<script>
const SUPABASE_URL = "https://iexcjfyxujdxnwfcfdim.supabase.co";
const SUPABASE_KEY = "sb_publishable_N4jDmA0AazQW3Xihi-DMzw_GYHKie8s";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function priorityClass(priority) {
  if (!priority) return "";
  if (priority.toLowerCase() === "hoch") return "high";
  if (priority.toLowerCase() === "mittel") return "medium";
  return "low";
}

function prioritySort(a, b) {
  const order = { hoch: 1, mittel: 2, niedrig: 3 };
  return (order[a.priority?.toLowerCase()] || 99) - (order[b.priority?.toLowerCase()] || 99);
}

async function loadTasks() {
  const day = document.getElementById("day").value;
  const areaFilter = document.getElementById("areaFilter").value;

  let query = db.from("tasks").select("*").eq("day", day);

  if (areaFilter) {
    query = query.eq("area", areaFilter);
  }

  const { data, error } = await query;

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "Fehler: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "Keine Aufgaben für diesen Tag.";
    return;
  }

  data.sort(prioritySort);

  data.forEach(task => {
    const div = document.createElement("div");
    div.className = `task ${priorityClass(task.priority)}`;

    const checked = task.done ? "checked" : "";
    const doneClass = task.done ? "done" : "";

    div.innerHTML = `
      <label class="${doneClass}">
        <input type="checkbox" ${checked} onchange="toggleTask('${task.id}', this.checked)">
        <strong>${task.area || ""}</strong> – ${task.title}
        ${task.priority ? " | " + task.priority : ""}
      </label>
      <br>
      <small>
        ${task.done_by ? "Erledigt von: " + task.done_by : ""}
        ${task.done_at ? " | " + new Date(task.done_at).toLocaleString("de-DE") : ""}
      </small>
    `;

    container.appendChild(div);
  });
}

async function toggleTask(id, value) {
  const name = document.getElementById("name").value.trim();

  if (!name) {
    alert("Bitte Namen eingeben.");
    loadTasks();
    return;
  }

  await db.from("tasks").update({
    done: value,
    done_by: value ? name : null,
    done_at: value ? new Date().toISOString() : null
  }).eq("id", id);

  loadTasks();
}

loadTasks();
</script>

</body>
</html>
